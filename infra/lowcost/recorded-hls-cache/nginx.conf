worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  proxy_cache_path /var/cache/nginx/recorded-hls
    levels=1:2
    keys_zone=recorded_hls_segments:256m
    max_size=20g
    inactive=24h
    use_temp_path=off;

  proxy_cache_path /var/cache/nginx/recorded-hls-manifests
    levels=1:2
    keys_zone=recorded_hls_manifests:128m
    max_size=20g
    inactive=24h
    use_temp_path=off;

  upstream edumaster_app {
    server app:5000;
    server app-2:5000;
    keepalive 64;
  }

  upstream manifest_app {
    server manifest-app:5001;
    server manifest-app-2:5001;
    keepalive 64;
  }

  server {
    listen 8080;
    server_name _;

    set $recorded_hls_cache_key "$scheme|$request_method|$host|$request_uri";

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ignore_headers Set-Cookie Cache-Control Expires;
    proxy_hide_header Set-Cookie;
    proxy_cache_methods GET HEAD;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 20s;
    proxy_cache_lock_age 20s;
    proxy_cache_background_update on;
    proxy_cache_revalidate on;
    proxy_cache_use_stale updating error timeout invalid_header http_500 http_502 http_503 http_504;

    add_header X-Recorded-Hls-Cache $upstream_cache_status always;
    add_header X-Cache-Status $upstream_cache_status always;
    add_header X-Cache-Detail "$server_name:$uri" always;
    add_header X-Cache-Key $recorded_hls_cache_key always;
    add_header X-Upstream-Response-Time $upstream_response_time always;
    add_header X-Proxy-Response-Time $request_time always;

    location ^~ /backend/api/courses/stream/ {
      proxy_pass http://edumaster_app;
      proxy_cache recorded_hls_segments;
      proxy_cache_valid 200 206 300s;
      proxy_cache_valid 301 302 300s;
      proxy_cache_valid 307 308 3600s;
    }

    location ^~ /backend/api/courses/h/ {
      proxy_pass http://edumaster_app;
      proxy_cache recorded_hls_manifests;
      proxy_cache_valid 200 206 300s;
      proxy_cache_valid 301 302 300s;
      proxy_cache_valid 307 308 3600s;
    }

    location ^~ /backend/api/courses/hls/ {
      proxy_pass http://edumaster_app;
      proxy_cache recorded_hls_segments;
      proxy_cache_valid 200 206 300s;
      proxy_cache_valid 301 302 300s;
      proxy_cache_valid 307 308 3600s;
    }

    location ~* ^/backend/api/course-manifests/b/.*\.m3u8$ {
      proxy_pass http://manifest_app;
      proxy_cache recorded_hls_manifests;
      proxy_cache_valid 200 206 900s;
      proxy_cache_valid 301 302 300s;
      proxy_cache_valid 307 308 3600s;
    }

    location ^~ /backend/api/course-manifests/b/ {
      proxy_pass http://manifest_app;
      proxy_cache recorded_hls_segments;
      proxy_cache_valid 200 206 86400s;
      proxy_cache_valid 301 302 300s;
      proxy_cache_valid 307 308 3600s;
    }

    location / {
      return 404;
    }
  }
}
