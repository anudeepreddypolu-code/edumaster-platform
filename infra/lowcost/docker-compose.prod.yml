version: "3.9"

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
      - nginx-rtmp
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ../../.env.production
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      LIVE_DOMAIN: ${LIVE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      PORT: 5000
      HOST: 0.0.0.0
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/edumaster
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      LIVE_HLS_INTERNAL_BASE_URL: http://nginx-rtmp:8080/hls
      REPLAY_IMPORT_API_BASE_URL: http://app:5000/backend/api
      LIVE_RECORDINGS_ROOT: /recordings
    depends_on:
      - postgres
      - redis
    volumes:
      - app-private:/app/private_uploads
      - app-uploads:/app/uploads
      - live-recordings:/recordings
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

  watch-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "backend/workers/watch-aggregator.cjs"]
    env_file:
      - ../../.env.production
    environment:
      POSTGRES_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/edumaster
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    depends_on:
      - app
      - redis

  replay-importer:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "backend/scripts/replay-importer.mjs"]
    env_file:
      - ../../.env.production
    environment:
      REPLAY_IMPORT_API_BASE_URL: http://app:5000/backend/api
      LIVE_RECORDINGS_ROOT: /recordings
      REPLAY_IMPORT_POLL_MS: 15000
      REPLAY_IMPORT_FILE_MIN_AGE_SECONDS: 20
      REPLAY_IMPORT_DELETE_AFTER_SUCCESS: "true"
      REPLAY_IMPORT_ADMIN_EMAIL: ${REPLAY_IMPORT_ADMIN_EMAIL:-${ADMIN_EMAIL}}
      REPLAY_IMPORT_ADMIN_PASSWORD: ${REPLAY_IMPORT_ADMIN_PASSWORD:-${ADMIN_PASSWORD}}
    depends_on:
      - app
      - nginx-rtmp
    volumes:
      - live-recordings:/recordings

  nginx-rtmp:
    build:
      context: .
      dockerfile: nginx-rtmp/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      NGINX_RTMP_INGEST_CALLBACK_URL: http://app:5000/backend/api/live-classes/ingest/on-publish
      LIVE_INGEST_PUBLISHER_SECRET: ${LIVE_INGEST_PUBLISHER_SECRET}
    ports:
      - "1935:1935"
    depends_on:
      - app
    volumes:
      - live-hls:/var/www/hls
      - live-recordings:/recordings

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: edumaster
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edumaster"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redis}\" ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  app-private:
  app-uploads:
  live-hls:
  live-recordings:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
