worker_processes auto;
pid /run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

rtmp_auto_push on;

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;
      gop_cache on;
      interleave on;
      wait_key on;
      drop_idle_publisher 20s;

      notify_method get;
      on_publish http://127.0.0.1:5000/api/live-classes/ingest/on-publish?secret=REPLACE_WITH_INGEST_SECRET;

      exec_push /usr/bin/ffmpeg -hide_banner -loglevel error -nostdin \
        -i rtmp://127.0.0.1:1935/live/$name \
        -c:a aac -ar 48000 \
        -map 0:v:0 -map 0:a:0 -c:v:0 libx264 -preset veryfast -tune zerolatency -profile:v:0 main -b:v:0 1600k -maxrate:v:0 1800k -bufsize:v:0 3200k -s:v:0 1280x720 -g 60 -keyint_min 60 -sc_threshold 0 -b:a:0 128k \
        -map 0:v:0 -map 0:a:0 -c:v:1 libx264 -preset veryfast -tune zerolatency -profile:v:1 main -b:v:1 800k -maxrate:v:1 950k -bufsize:v:1 1600k -s:v:1 854x480 -g 60 -keyint_min 60 -sc_threshold 0 -b:a:1 96k \
        -f hls \
        -hls_time 6 \
        -hls_list_size 8 \
        -hls_flags delete_segments+append_list+omit_endlist+independent_segments+program_date_time \
        -master_pl_name master.m3u8 \
        -var_stream_map "v:0,a:0,name:720p v:1,a:1,name:480p" \
        -hls_segment_filename /var/www/hls/$name/%v/segment_%06d.ts \
        /var/www/hls/$name/%v/index.m3u8;
    }
  }
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  types {
    application/vnd.apple.mpegurl m3u8;
    video/mp2t ts;
  }

  server {
    listen 8080;
    server_name _;

    location /healthz {
      default_type text/plain;
      return 200 "ok\n";
    }

    location /hls/ {
      alias /var/www/hls/;
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;

      if ($request_method = OPTIONS) {
        return 204;
      }
    }
  }
}
